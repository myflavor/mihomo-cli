name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
          - arch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build with Makefile
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
        run: make build

      - name: Package
        run: |
          tar -czf mihomo-cli-linux-${{ matrix.arch }}.tar.gz -C out .

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: |
            mihomo-cli-linux-${{ matrix.arch }}.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
